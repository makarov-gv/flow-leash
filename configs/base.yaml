seed: 0
device: auto
num_workers: 8

data:
  root: data/imagenet/train
  image_size: 256

vae:
  pretrained: stabilityai/sd-vae-ft-mse
  scaling_factor: null
  train_decoder: false
  grad_checkpoint: false

loss:
  l1_weight: 1.0
  lpips_weight: 1.0
  lpips_net: vgg
  kl_weight: 1.0e-6
  vfm_weight: 0.0
  critic_weight: 0.0

vfm:
  name: dinov2_vitb14
  img_size: 224
  w_cos: 1.0
  w_dist: 1.0

critic:
  checkpoint: runs/critic/model.pt
  t_lo: 0.1
  t_hi: 0.6
  weight_scheme: snr
  var_floor_ratio: 0.5
  var_anchor_weight: 1.0
  var_batches: 8
  grad_clip_value: 50.0
  warmup_steps: 2000

train:
  batch_size: 16
  lr: 1.0e-4
  weight_decay: 0.0
  grad_clip: 1.0
  amp: true
  max_steps: 40000
  log_every: 100

io:
  out_dir: runs/vae
  batch_size: 32
  shard_size: 5000
